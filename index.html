<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>GradeFlow Dashboard-Focus</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;900&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="sidebar">
        <div class="logo">Grade<span>Flow</span></div>
        <button class="nav-btn active" id="btn-list" onclick="showPage('list')">🏠 Dashboard</button>
        <button class="nav-btn" id="btn-goals" onclick="showPage('goals')">🎯 Meine Ziele</button>
        <button class="nav-btn" onclick="factoryReset()">⚙️ Reset</button>
    </nav>

    <main class="content">
        <section id="page-list" class="page active">
            <div class="header">
                <h1>Dashboard</h1>
                <div class="main-avg" id="main-avg">-</div>
            </div>
            <div class="add-bar">
                <input type="text" id="name-in" placeholder="Fach Name...">
                <button onclick="addFach()">Hinzufügen</button>
            </div>
            <div id="dash-grid" class="modern-grid"></div>
        </section>

        <section id="page-goals" class="page">
            <h1>🎯 Deine persönlichen Ziele</h1>
            <div id="goals-list" class="goals-container"></div>
        </section>

        <section id="page-detail" class="page">
            <button class="back-link" onclick="showPage('list')">← Zurück</button>
            <div class="hero-card" id="det-hero">
                <h1 id="det-title">-</h1>
                <div class="hero-score" id="det-score">-</div>
                <div class="status-pill" id="det-status">-</div>
            </div>
            <div class="input-area">
                <div class="glass">
                    <h3>Note eintragen</h3>
                    <div class="flex-input">
                        <input type="number" id="note-in" placeholder="Punkte...">
                        <button class="btn-primary" onclick="addNote()">Hinzufügen</button>
                    </div>
                </div>
            </div>
            <div id="note-history" class="history"></div>
            <button class="btn-danger" onclick="delFach()">Fach löschen</button>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
