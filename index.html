<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>GradeFlow Intelligence</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="logo">GF<span>.intel</span></div>
            <nav>
                <button onclick="tab('dash')" id="t-dash" class="active">Dashboard</button>
                <button onclick="tab('goals')" id="t-goals">Ziele</button>
                <button onclick="tab('stats')" id="t-stats">Analyse</button>
            </nav>
            <button class="danger-zone" onclick="fullReset()">System Reset</button>
        </aside>

        <main class="viewport">
            <section id="view-dash" class="view active">
                <header class="v-header">
                    <h1>Übersicht</h1>
                    <div class="input-glow">
                        <input type="text" id="sub-in" placeholder="Fach hinzufügen...">
                        <button onclick="addSub()">+</button>
                    </div>
                </header>
                <div id="dash-grid" class="bento-grid"></div>
            </section>

            <section id="view-goals" class="view">
                <header class="v-header"><h1>Ziel-Fokus</h1></header>
                <div id="goals-grid" class="bento-grid"></div>
            </section>

            <section id="view-stats" class="view">
                <header class="v-header"><h1>Daten-Analyse</h1></header>
                <div class="stats-layout">
                    <div class="chart-card">
                        <h3>Punkte-Verteilung</h3>
                        <div id="dist-chart" class="bar-chart"></div>
                    </div>
                    <div class="mini-grid">
                        <div class="stat-box"><h3>Beste Note</h3><p id="s-best">-</p></div>
                        <div class="stat-box"><h3>Schnitt</h3><p id="s-avg">0.0</p></div>
                    </div>
                </div>
            </section>

            <section id="view-det" class="view">
                <button class="back" onclick="tab('dash')">← Dashboard</button>
                <div id="hero" class="hero">
                    <h2 id="det-name">-</h2>
                    <div class="score-display" id="det-avg">0.0</div>
                </div>
                <div class="add-grade-box">
                    <input type="number" id="grade-in" placeholder="Note (0-15)">
                    <button onclick="addGrade()">Hinzufügen</button>
                </div>
                <div id="history" class="history"></div>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
