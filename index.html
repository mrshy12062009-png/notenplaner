<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>GradeFlow Pro Elite</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="custom-modal" class="modal-overlay">
        <div class="modal-card">
            <h2 id="modal-text">Bist du sicher?</h2>
            <div class="modal-btns">
                <button class="btn-confirm" id="modal-confirm">Ja</button>
                <button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
            </div>
        </div>
    </div>

    <nav class="sidebar">
        <div class="logo">Grade<span>Flow</span></div>
        <button class="nav-btn active" id="btn-list" onclick="showPage('list')">🏠 Dashboard</button>
        <button class="nav-btn" id="btn-goals" onclick="showPage('goals')">🎯 Meine Ziele</button>
        <div class="spacer"></div>
        <button class="nav-btn-reset" onclick="askReset()">Daten löschen</button>
    </nav>

    <main class="content">
        <section id="page-list" class="page active">
            <div class="header">
                <h1>Dashboard</h1>
                <div class="main-avg" id="main-avg">0.0</div>
            </div>
            <div class="add-bar">
                <input type="text" id="name-in" placeholder="Fach hinzufügen... (Enter)" onkeydown="if(event.key==='Enter') addFach()">
                <button onclick="addFach()">+</button>
            </div>
            <div id="dash-grid" class="modern-grid"></div>
        </section>

        <section id="page-goals" class="page">
            <h1>🎯 Deine Wunsch-Ziele</h1>
            <div id="goals-list" class="goals-container"></div>
        </section>

        <section id="page-detail" class="page">
            <button class="back-link" onclick="showPage('list')">← Zurück</button>
            <div class="hero-card" id="det-hero">
                <h1 id="det-title">-</h1>
                <div class="hero-score" id="det-score">0.0</div>
                <div id="det-status" class="status-pill">-</div>
            </div>
            <div class="glass">
                <h3>Note eintragen</h3>
                <div class="flex-input">
                    <input type="number" id="note-in" min="0" max="15" placeholder="Punkte..." onkeydown="if(event.key==='Enter') addNote()">
                    <button class="btn-primary" onclick="addNote()">OK</button>
                </div>
            </div>
            <div id="note-history"></div>
            <button class="btn-danger" onclick="askDeleteFach()">Fach löschen</button>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
