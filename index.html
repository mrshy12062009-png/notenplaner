<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeFlow v15 Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="sidebar">
        <div class="logo">Grade<span>Flow</span></div>
        <button class="nav-btn" onclick="showPage('list')">🏠 Dashboard</button>
        <button class="nav-btn" onclick="showPage('stats')">📈 Statistiken</button>
        <button class="nav-btn" onclick="showPage('settings')">⚙️ Einstellungen</button>
    </nav>

    <main class="main-content">
        <section id="page-list" class="page">
            <h1>Hallo, <span id="display-name">Schüler</span>!</h1>
            <div class="input-card">
                <input type="text" id="f-name" placeholder="Neues Fach (z.B. Mathe)...">
                <button class="btn-accent" onclick="addFach()">Fach hinzufügen</button>
            </div>
            <div id="grid-container" class="dashboard-grid"></div>
        </section>

        <section id="page-stats" class="page">
            <h1>Statistiken</h1>
            <div class="stats-hero">
                <div><h2 id="total-avg">-</h2><p>Schnitt</p></div>
                <div><h2 id="total-count">0</h2><p>Noten</p></div>
            </div>
            <div class="input-card">
                <canvas id="myChart"></canvas>
            </div>
        </section>

        <section id="page-settings" class="page">
            <h1>Einstellungen</h1>
            <div class="input-card">
                <input type="text" id="set-name" placeholder="Dein Name...">
                <input type="number" id="set-target" placeholder="Ziel-Schnitt (z.B. 11)">
                <select id="set-system">
                    <option value="points">Punkte (0-15)</option>
                    <option value="grades">Noten (1-6)</option>
                </select>
                <button class="btn-accent" onclick="saveSettings()">Speichern</button>
            </div>
            <div class="color-picker">
                <div class="color-dot" style="background:#5865f2" onclick="changeTheme('#5865f2')"></div>
                <div class="color-dot" style="background:#ef4444" onclick="changeTheme('#ef4444')"></div>
                <div class="color-dot" style="background:#22c55e" onclick="changeTheme('#22c55e')"></div>
            </div>
            <button class="btn-danger" onclick="resetAll()">⚠️ Daten löschen</button>
        </section>

        <section id="page-detail" class="page">
            <button onclick="showPage('list')" class="btn-link">← Zurück</button>
            <h1 id="det-title">Fach</h1>
            <div class="stats-hero"><h2 id="det-avg">-</h2></div>
            <div class="input-card">
                <input type="number" id="n-val" placeholder="Note/Punkte...">
                <button class="btn-accent" onclick="addNote()">Note hinzufügen</button>
            </div>
            <div id="notes-list"></div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
