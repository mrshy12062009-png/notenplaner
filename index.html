<nav class="sidebar">
    <div class="logo">GRADE<span>FLOW</span></div>
    <button class="nav-btn active" onclick="showPage('list')">DASHBOARD</button>
    <button class="nav-btn" onclick="showPage('calendar')">KALENDER</button>
</nav>

<main class="content">
    <section id="page-list" class="page active">
        <h1>MEINE FÄCHER</h1>
        <div class="input-group">
            <input type="text" id="f-in" placeholder="Fach hinzufügen...">
            <button class="add-btn" onclick="addFach()">HINZUFÜGEN</button>
        </div>
        <div id="grid" class="grid"></div>
    </section>

    <section id="page-calendar" class="page">
        <div class="cal-nav" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <button class="add-btn" onclick="changeMonth(-1)">◀</button>
            <h2 id="month-name">März 2026</h2>
            <button class="add-btn" onclick="changeMonth(1)">▶</button>
        </div>
        <div class="calendar-card" style="background:var(--card); padding:20px; border-radius:12px;">
            <div class="weekdays" style="display:grid; grid-template-columns:repeat(7,1fr); text-align:center; font-weight:bold; color:var(--accent); margin-bottom:10px;">
                <div>Mo</div><div>Di</div><div>Mi</div><div>Do</div><div>Fr</div><div>Sa</div><div>So</div>
            </div>
            <div id="calendar-grid" class="days-grid" style="display:grid; grid-template-columns:repeat(7,1fr); gap:5px;"></div>
        </div>
    </section>

    <section id="page-detail" class="page">
        <button onclick="showPage('list')" style="background:none; border:none; color:var(--accent); cursor:pointer;">← Zurück</button>
        <div class="banner">
            <h2 id="d-title">-</h2>
            <div id="d-avg">-</div>
        </div>
        <div class="input-group">
            <input type="number" id="n-in" placeholder="Note">
            <button class="add-btn" onclick="addNote()">OK</button>
        </div>
        <div id="n-list"></div>
    </section>
</main>
