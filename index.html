<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>GradeFlow Pro | Clean Edition</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="modal-overlay" class="modal-ov hidden">
        <div class="modal">
            <h2 id="modal-title">Bestätigen</h2>
            <div class="modal-btns">
                <button class="btn-confirm" id="modal-confirm">Ja</button>
                <button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
            </div>
        </div>
    </div>

    <div class="app-shell">
        <aside class="sidebar">
            <div class="brand">Grade<span>Flow</span></div>
            <nav class="menu">
                <button class="menu-item active" id="btn-dash" onclick="view('dash')">🏠 Dashboard</button>
                <button class="menu-item" id="btn-goals" onclick="view('goals')">🎯 Ziele</button>
            </nav>
            <button class="reset-trigger" onclick="fullReset()">Daten löschen</button>
        </aside>

        <main class="content">
            <section id="view-dash" class="tab active">
                <header class="section-header">
                    <h1>Deine Übersicht</h1>
                    <div class="total-pill">Schnitt: <span id="total-avg">0.0</span></div>
                </header>
                <div class="input-group">
                    <input type="text" id="subject-in" placeholder="Neues Fach... (Enter)" onkeydown="if(event.key==='Enter') addSubject()">
                    <button class="add-btn" onclick="addSubject()">Hinzufügen</button>
                </div>
                <div id="subject-grid" class="grid"></div>
            </section>

            <section id="view-goals" class="tab">
                <header class="section-header"><h1>Ziel-Fokus</h1></header>
                <div id="goals-list" class="goals-wrapper"></div>
            </section>

            <section id="view-det" class="tab">
                <button class="back-nav" onclick="view('dash')">← Zurück</button>
                <div id="det-card" class="hero-card">
                    <h1 id="det-name">-</h1>
                    <div class="hero-avg" id="det-num">0.0</div>
                    <div class="hero-label" id="det-status">-</div>
                </div>
                <div class="form-box">
                    <h3>Note eintragen</h3>
                    <div class="input-group">
                        <input type="number" id="grade-in" min="0" max="15" placeholder="Punkte (0-15)..." onkeydown="if(event.key==='Enter') addGrade()">
                        <button class="add-btn" onclick="addGrade()">Speichern</button>
                    </div>
                </div>
                <div id="history" class="history-grid"></div>
                <button class="delete-subject-btn" onclick="deleteSubjectTrigger()">Fach löschen</button>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
