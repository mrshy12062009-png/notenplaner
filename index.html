<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeFlow Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="sidebar">
        <div class="logo">Grade<span>Flow</span></div>
        <button class="nav-btn active" id="btn-list" onclick="showPage('list')">🏠 Dashboard</button>
        <button class="nav-btn" id="btn-goals" onclick="showPage('goals')">🎯 Meine Ziele</button>
        <button class="nav-btn" id="btn-settings" onclick="showPage('settings')">⚙️ Einstellungen</button>
    </nav>

    <main class="main-content">
        <section id="page-list" class="page active">
            <h1>Dashboard</h1>
            <div class="input-card">
                <input type="text" id="f-name" placeholder="Neues Fach...">
                <button class="btn-accent" onclick="addFach()">Hinzufügen</button>
            </div>
            <div id="grid-container" class="dashboard-grid"></div>
        </section>

        <section id="page-goals" class="page">
            <h1>Meine Ziele</h1>
            <div class="input-card">
                <label>Dein Zielwert (z.B. 11 oder 2.0)</label>
                <input type="number" id="goal-input" step="0.1">
                <button class="btn-accent" onclick="updateGoal()">Ziel speichern</button>
            </div>
            <div class="input-card">
                <h3>Farblegende</h3>
                <div style="display:flex; gap:15px; flex-direction:column">
                    <div><span style="color:var(--success)">●</span> Grün: Ziel erreicht</div>
                    <div><span style="color:var(--warning)">●</span> Gelb: Knapp darunter</div>
                    <div><span style="color:var(--danger)">●</span> Rot: Handlungsbedarf</div>
                </div>
            </div>
        </section>

        <section id="page-settings" class="page">
            <h1>Einstellungen</h1>
            <div class="input-card">
                <label>App-Design Farbe</label>
                <div class="color-picker" style="margin-top:10px">
                    <div class="color-dot" style="background:#5865f2" onclick="changeTheme('#5865f2')"></div>
                    <div class="color-dot" style="background:#a855f7" onclick="changeTheme('#a855f7')"></div>
                    <div class="color-dot" style="background:#2ed573" onclick="changeTheme('#2ed573')"></div>
                    <div class="color-dot" style="background:#ff4757" onclick="changeTheme('#ff4757')"></div>
                </div>
            </div>
            <button class="btn-danger" onclick="resetAll()">⚠️ Alle Daten löschen</button>
        </section>

        <section id="page-detail" class="page">
            <button onclick="showPage('list')" class="btn-back">← Zurück</button>
            <div class="detail-header" id="det-header">
                <h1 id="det-title" style="margin:0">Fach</h1>
                <h2 id="det-avg" style="margin:0; font-size:40px">15.0</h2>
            </div>
            
            <div class="input-card">
                <h3>Note hinzufügen</h3>
                <input type="number" id="n-val" placeholder="Wert...">
                <button class="btn-accent" onclick="addNote()">Speichern</button>
            </div>
            <div id="notes-list"></div>
            <button onclick="deleteFach()" class="btn-link-danger">Fach löschen</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
