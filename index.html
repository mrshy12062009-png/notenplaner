<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeFlow Live</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="sidebar">
        <div class="logo">GRADE<span>FLOW</span></div>
        <button class="nav-btn active" id="btn-list" onclick="showPage('list')">DASHBOARD</button>
        <button class="nav-btn" id="btn-calendar" onclick="showPage('calendar')">KALENDER</button>
        
        <div class="settings" style="margin-top: auto; padding-top: 20px; border-top: 1px solid #30363d;">
            <label style="font-size: 12px; color: #8b949e;">Bundesland:</label>
            <select id="bundesland" onchange="initCalendar()" style="width: 100%; background: #0d1117; color: white; border: 1px solid #30363d; padding: 5px; border-radius: 4px; margin-top: 5px;">
                <option value="BE">Berlin</option>
                <option value="BB">Brandenburg</option>
                <option value="BY">Bayern</option>
                <option value="NW">NRW</option>
            </select>
        </div>
    </nav>

    <main class="content">
        
        <section id="page-list" class="page active">
            <h1>MEINE FÄCHER</h1>
            <div class="input-group">
                <input type="text" id="f-in" placeholder="Neues Fach hinzufügen...">
                <button class="add-btn" onclick="addFach()">HINZUFÜGEN</button>
            </div>
            <div id="grid" class="grid"></div>
        </section>
        
        <section id="page-detail" class="page">
            <button class="back-link" onclick="showPage('list')" style="cursor: pointer; background: none; border: none; color: #5865f2; font-weight: bold; margin-bottom: 20px;">
                ← Zurück zum Dashboard
            </button>
            <div class="banner">
                <h2 id="d-title">-</h2>
                <div id="d-avg" style="font-size: 24px; font-weight: bold;">-</div>
            </div>
            <div class="input-group">
                <input type="number" id="n-in" placeholder="Punkte (0-15)" min="0" max="15">
                <button class="add-btn" onclick="addNote()">SPEICHERN</button>
            </div>
            <div id="n-list"></div>
        </section>

        <section id="page-calendar" class="page">
            <div class="cal-nav" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; background: #161b22; padding: 15px; border-radius: 10px; border: 1px solid #30363d;">
                <button class="add-btn" onclick="changeMonth(-1)">◀</button>
                <h2 id="month-name" style="margin: 0;">Monat 2026</h2>
                <button class="add-btn" onclick="changeMonth(1)">▶</button>
            </div>
            
            <div class="calendar-card" style="background: #21262d; padding: 20px; border-radius: 12px; border: 1px solid #30363d;">
                <div class="weekdays" style="display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-weight: bold; color: #5865f2; margin-bottom: 15px; border-bottom: 1px solid #30363d; padding-bottom: 10px;">
                    <div>Mo</div><div>Di</div><div>Mi</div><div>Do</div><div>Fr</div><div>Sa</div><div>So</div>
                </div>
                <div id="calendar-grid" class="days-grid" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px;">
                    </div>
            </div>
            
            <div class="legend" style="margin-top: 20px; display: flex; gap: 15px; font-size: 12px; color: #8b949e;">
                <div style="display: flex; align-items: center; gap: 5px;">
                    <span style="width: 10px; height: 10px; background: #238636; border-radius: 2px;"></span> MSA Prüfung
                </div>
                <div style="display: flex; align-items: center; gap: 5px;">
                    <span style="width: 10px; height: 10px; border: 1px solid #5865f2; border-radius: 2px;"></span> Heute
                </div>
                <div style="display: flex; align-items: center; gap: 5px; opacity: 0.4;">
                    <span style="width: 10px; height: 10px; background: #0d1117; border: 1px solid #30363d; border-radius: 2px;"></span> Vergangen
                </div>
            </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
