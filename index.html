<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeFlow Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="sidebar">
        <div class="logo">Grade<span>Flow</span></div>
        <button class="nav-btn active" onclick="showPage('list')">Dashboard</button>
        <button class="nav-btn" onclick="showPage('stats')">Statistiken</button>
    </nav>

    <main class="main-content">
        <section id="page-list" class="page active">
            <div class="page-header">
                <h1>Meine Fächer</h1>
                <div class="input-bar">
                    <input type="text" id="f-name" placeholder="Neues Fach...">
                    <button class="btn-accent" onclick="addFach()">Hinzufügen</button>
                </div>
            </div>
            <div id="grid-container" class="dashboard-grid"></div>
        </section>

        <section id="page-detail" class="page">
            <button class="btn-link" onclick="showPage('list')">← Zurück</button>
            <div id="hero-banner" class="subject-hero">
                <div class="hero-info">
                    <h2 id="det-title">Fachname</h2>
                    <p>Punkteschnitt</p>
                </div>
                <div id="det-avg" class="hero-grade">-</div>
            </div>
            <div class="detail-layout">
                <div id="notes-history" class="history-column"></div>
                <div class="input-column">
                    <div class="input-card">
                        <h3>Note eintragen</h3>
                        <input type="number" id="n-val" placeholder="0-15 Punkte" min="0" max="15">
                        <button class="btn-accent full-width" onclick="addNote()">Speichern</button>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
