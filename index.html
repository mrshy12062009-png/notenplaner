<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeFlow Ultra Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="sidebar">
        <div class="logo">Grade<span>Flow</span></div>
        <div class="nav-links">
            <button class="nav-btn active" id="btn-list" onclick="showPage('list')">🏠 Dashboard</button>
            <button class="nav-btn" id="btn-goals" onclick="showPage('goals')">🎯 Ziele-Fokus</button>
            <button class="nav-btn" id="btn-settings" onclick="showPage('settings')">⚙️ Einstellungen</button>
        </div>
    </nav>

    <main class="main-content">
        <section id="page-list" class="page active">
            <div class="top-bar">
                <div class="title-group">
                    <h1>Dashboard</h1>
                    <p>Deine Noten in voller Farbe</p>
                </div>
                <div class="total-score-card">
                    <small>Gesamtschnitt</small>
                    <div id="dash-total">-</div>
                </div>
            </div>

            <div class="add-fach-area">
                <input type="text" id="f-name" placeholder="Neues Fach eingeben...">
                <button onclick="addFach()" class="btn-primary">Fach erstellen</button>
            </div>

            <div id="grid-container" class="vibrant-grid"></div>
        </section>

        <section id="page-goals" class="page">
            <div class="section-header">
                <h1>🎯 Deine Ziele</h1>
                <p>Fortschritt bis zur Wunschpunktzahl (Unendlich möglich)</p>
            </div>
            <div id="goals-list" class="massive-goals-container"></div>
        </section>

        <section id="page-detail" class="page">
            <button onclick="showPage('list')" class="btn-back">← Zum Dashboard</button>
            
            <div class="mega-hero-card" id="det-header">
                <div class="hero-main">
                    <h1 id="det-title">-</h1>
                    <div class="status-badge-large" id="det-status-badge">-</div>
                </div>
                <div class="hero-score-circle" id="det-avg">-</div>
            </div>

            <div class="action-grid">
                <div class="glass-input-card">
                    <h3>Punkte-Ziel anpassen</h3>
                    <input type="number" id="f-target-input" placeholder="Zielwert (z.B. 15 oder 100)">
                    <button class="btn-save" onclick="saveFachTarget()">Ziel speichern</button>
                </div>
                <div class="glass-input-card">
                    <h3>Neue Note eintragen</h3>
                    <input type="number" id="n-val" placeholder="Punkte...">
                    <button class="btn-save" onclick="addNote()">Note hinzufügen</button>
                </div>
            </div>

            <div class="history-section">
                <h3>Noten-Historie</h3>
                <div id="notes-list" class="notes-history-stack"></div>
                <button onclick="deleteFach()" class="btn-danger-ghost">🗑️ Fach komplett löschen</button>
            </div>
        </section>

        <section id="page-settings" class="page">
            <h1>Einstellungen</h1>
            <div class="glass-input-card">
                <p>Hier kannst du alle Daten zurücksetzen.</p>
                <button class="btn-danger" onclick="resetAll()">⚠️ Alle Daten löschen</button>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
