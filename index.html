<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>GradeFlow Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="sidebar">
        <div class="logo">GRADE<span>FLOW</span></div>
        <button class="nav-btn active" onclick="showPage('list')">DASHBOARD</button>
        <button class="nav-btn" onclick="showPage('calendar')">KALENDER</button>
    </nav>
    <button class="nav-btn" onclick="showPage('calendar')">KALENDER</button>

<section id="page-calendar" class="page">
    <div class="cal-nav" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <button class="add-btn" onclick="changeMonth(-1)">◀</button>
        <h2 id="month-name">-</h2>
        <button class="add-btn" onclick="changeMonth(1)">▶</button>
    </div>

    <div class="calendar-card" style="background:var(--card); padding:20px; border-radius:12px; border:1px solid #30363d;">
        <div class="weekdays" style="display:grid; grid-template-columns:repeat(7,1fr); text-align:center; font-weight:bold; color:var(--accent); margin-bottom:10px;">
            <div>Mo</div><div>Di</div><div>Mi</div><div>Do</div><div>Fr</div><div>Sa</div><div>So</div>
        </div>
        <div id="calendar-grid" style="display:grid; grid-template-columns:repeat(7,1fr); gap:5px;"></div>
    </div>

    <div style="margin-top:20px; padding:15px; background:#161b22; border-radius:8px; border:1px solid #30363d;">
        <h3 style="font-size:14px; margin-bottom:10px;">Termin hinzufügen (z.B. für 2027)</h3>
        <div class="input-group">
            <input type="date" id="event-date">
            <input type="text" id="event-text" placeholder="Prüfungsname...">
            <button class="add-btn" onclick="addUserEvent()">HINZUFÜGEN</button>
        </div>
    </div>
</section>
    
    <main class="content">
        <section id="page-list" class="page active">
            <h1>MEINE FÄCHER</h1>
            <div class="input-group">
                <input type="text" id="f-in" placeholder="Neues Fach...">
                <button class="add-btn" onclick="addFach()">OK</button>
            </div>
            <div id="grid" class="grid"></div>
        </section>

        <section id="page-calendar" class="page">
            <div class="cal-nav">
                <button class="add-btn" onclick="changeMonth(-1)">◀</button>
                <h2 id="month-name"></h2>
                <button class="add-btn" onclick="changeMonth(1)">▶</button>
            </div>
            
            <div class="calendar-card">
                <div class="weekdays">
                    <div>Mo</div><div>Di</div><div>Mi</div><div>Do</div><div>Fr</div><div>Sa</div><div>So</div>
                </div>
                <div id="calendar-grid" class="days-grid"></div>
            </div>

            <div class="admin-panel" style="margin-top: 20px; background: #161b22; padding: 15px; border-radius: 8px; border: 1px solid #30363d;">
                <h3>Termin-Planer (für Updates)</h3>
                <div class="input-group" style="margin-top: 10px;">
                    <input type="date" id="event-date">
                    <input type="text" id="event-text" placeholder="Prüfungsname...">
                    <button class="add-btn" onclick="addUserEvent()">HINZUFÜGEN</button>
                </div>
                <button onclick="clearAllEvents()" style="background:none; border:none; color:#f85149; cursor:pointer; font-size:12px; margin-top:10px;">Alle Termine zurücksetzen</button>
            </div>
        </section>
        
        <section id="page-detail" class="page">
            <button class="back" onclick="showPage('list')">← Zurück</button>
            <div class="banner">
                <h2 id="d-title">-</h2>
                <div id="d-avg">-</div>
            </div>
            <div class="input-group">
                <input type="number" id="n-in" placeholder="Punkte (0-15)">
                <button class="add-btn" onclick="addNote()">SPEICHERN</button>
            </div>
            <div id="n-list"></div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
