<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeFlow Live</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="sidebar">
        <div class="logo">GRADE<span>FLOW</span></div>
        <button class="nav-btn active" id="btn-list" onclick="showPage('list')">DASHBOARD</button>
        <button class="nav-btn" id="btn-calendar" onclick="showPage('calendar')">KALENDER</button>
        
        <div class="settings">
            <label>Bundesland:</label>
            <select id="bundesland" onchange="changeBundesland()">
                <option value="BE">Berlin</option>
                <option value="BY">Bayern</option>
                <option value="NW">NRW</option>
                <option value="HE">Hessen</option>
            </select>
        </div>
    </nav>

    <main class="content">
        <section id="page-list" class="page active">
            <h1>MEINE FÄCHER</h1>
            <div class="input-group">
                <input type="text" id="f-in" placeholder="Neues Fach...">
                <button class="add-btn" onclick="addFach()">HINZUFÜGEN</button>
            </div>
            <div id="grid" class="grid"></div>
        </section>
        
        <section id="page-detail" class="page">
            <button class="back-btn" onclick="showPage('list')">← Zurück</button>
            <div class="banner">
                <h2 id="d-title">-</h2>
                <div id="d-avg">-</div>
            </div>
            <div class="input-group">
                <input type="number" id="n-in" placeholder="Punkte (0-15)">
                <button class="add-btn" onclick="addNote()">OK</button>
            </div>
            <div id="n-list"></div>
        </section>

        <section id="page-calendar" class="page">
            <div class="cal-nav">
                <button class="add-btn" onclick="changeMonth(-1)"> Zurück </button>
                <h2 id="month-name">Monat Jahr</h2>
                <button class="add-btn" onclick="changeMonth(1)"> Vor </button>
            </div>
            <div class="calendar-wrapper">
                <div class="weekdays">
                    <div>Mo</div><div>Di</div><div>Mi</div><div>Do</div><div>Fr</div><div>Sa</div><div>So</div>
                </div>
                <div id="calendar-grid" class="days-grid"></div>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
