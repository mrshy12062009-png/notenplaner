<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>GradeFlow Analytics</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="logo">GF<span>.stats</span></div>
            <nav>
                <button onclick="tab('dash')" id="t-dash" class="active">🏠 Dashboard</button>
                <button onclick="tab('stats')" id="t-stats">📊 Statistiken</button>
            </nav>
            <button class="reset" onclick="fullReset()">Reset</button>
        </aside>

        <main class="viewport">
            <section id="view-dash" class="view active">
                <div class="v-header">
                    <h1>Deine Fächer</h1>
                    <div class="input-row">
                        <input type="text" id="sub-in" placeholder="Fach-Name...">
                        <button onclick="addSub()" class="btn-main">Hinzufügen</button>
                    </div>
                </div>
                <div id="dash-grid" class="bento-grid"></div>
            </section>

            <section id="view-stats" class="view">
                <div class="v-header"><h1>Analyse</h1></div>
                <div class="stats-card main-chart-card">
                    <h3>Notenverteilung (0-15 Punkte)</h3>
                    <div id="bar-chart" class="chart-container"></div>
                    <div class="chart-axis">
                        <span>0</span><span>5</span><span>10</span><span>15</span>
                    </div>
                </div>
                <div class="stats-row">
                    <div class="stats-card"><h3>Schnitt</h3><p id="st-avg">0.0</p></div>
                    <div class="stats-card"><h3>Bestwert</h3><p id="st-best">-</p></div>
                </div>
            </section>

            <section id="view-det" class="view">
                <button class="back" onclick="tab('dash')">← Zurück</button>
                <div id="det-hero" class="hero">
                    <h2 id="det-name">-</h2>
                    <div id="det-avg" class="big-score">0.0</div>
                </div>
                <div class="input-row">
                    <input type="number" id="grade-in" placeholder="Note (0-15)">
                    <button onclick="addGrade()" class="btn-main">OK</button>
                </div>
                <div id="history" class="history-list"></div>
                <button class="del-sub" onclick="delSub()">Fach löschen</button>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
