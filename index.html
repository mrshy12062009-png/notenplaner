<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeFlow Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="sidebar">
        <div class="logo">Grade<span>Flow</span></div>
        <button class="nav-btn active" id="btn-list" onclick="showPage('list')">🏠 Dashboard</button>
        <button class="nav-btn" id="btn-goals" onclick="showPage('goals')">🎯 Meine Ziele</button>
        <button class="nav-btn" id="btn-settings" onclick="showPage('settings')">⚙️ Einstellungen</button>
    </nav>

    <main class="main-content">
        <section id="page-list" class="page active">
            <div class="header-area">
                <h1>Dashboard</h1>
                <div class="total-badge">Schnitt: <span id="dash-total">-</span></div>
            </div>
            <div class="input-card">
                <input type="text" id="f-name" placeholder="Neues Fach...">
                <button class="btn-accent" onclick="addFach()">Hinzufügen</button>
            </div>
            <div id="grid-container" class="dashboard-grid"></div>
        </section>

        <section id="page-goals" class="page">
            <h1>🎯 Meine Ziele</h1>
            <div class="input-card">
                <label>Globales Gesamtziel</label>
                <input type="number" id="goal-input" step="0.1" oninput="updateGoal(this.value)">
                <small style="opacity:0.6">Gilt für alle Fächer ohne eigenes Ziel.</small>
            </div>
            <h3>Fächer-Analyse <small>(Klicken für eigenes Ziel)</small></h3>
            <div id="goals-list" class="goals-list"></div>
        </section>

        <section id="page-settings" class="page">
            <h1>⚙️ Einstellungen</h1>
            <div class="input-card">
                <button class="btn-danger" onclick="resetAll()">⚠️ Alle Daten löschen</button>
            </div>
        </section>

        <section id="page-detail" class="page">
            <button onclick="showPage('list')" class="btn-back">← Zurück</button>
            <div class="detail-header" id="det-header">
                <div>
                    <h1 id="det-title">Fach</h1>
                    <span id="det-status-label" class="badge-white">Status</span>
                </div>
                <div class="big-avg" id="det-avg">-</div>
            </div>
            <div class="detail-grid">
                <div class="input-card">
                    <h3>Note hinzufügen</h3>
                    <input type="number" id="n-val" placeholder="Wert...">
                    <button class="btn-accent" onclick="addNote()">Speichern</button>
                </div>
                <div class="input-card" id="det-analysis-box">
                    <h3>Analyse</h3>
                    <div id="det-analysis-text">-</div>
                </div>
            </div>
            <div id="notes-list"></div>
            <button onclick="deleteFach()" class="btn-link-danger">Fach löschen</button>
        </section>
    </main>

    <div id="goal-modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title">Ziel für Fach</h3>
            <input type="number" id="modal-goal-input" placeholder="Eigenes Ziel (z.B. 13)">
            <div style="display:flex; gap:10px;">
                <button class="btn-accent" onclick="saveSubjectGoal()">Speichern</button>
                <button class="btn-danger" onclick="closeModal()">Abbrechen</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
