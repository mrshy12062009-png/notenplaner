<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>GradeFlow Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="sidebar">
        <div class="logo">GRADE<span>FLOW</span></div>
        <button class="nav-btn active" id="btn-list" onclick="showPage('list')">DASHBOARD</button>
        <button class="nav-btn" id="btn-calendar" onclick="showPage('calendar')">KALENDER</button>
    </nav>
    
    <main class="content">
        <section id="page-list" class="page active">
            <h1>MEINE FÄCHER</h1>
            <div class="input-group">
                <input type="text" id="f-in" placeholder="Neues Fach...">
                <button class="add-btn" onclick="addFach()">HINZUFÜGEN</button>
            </div>
            <div id="grid" class="grid"></div>
        </section>

        <section id="page-calendar" class="page">
            <div class="cal-nav">
                <button class="btn-icon" onclick="changeMonth(-1)">◀</button>
                <h2 id="month-name">März 2026</h2>
                <button class="btn-icon" onclick="changeMonth(1)">▶</button>
            </div>
            <div class="calendar-card">
                <div class="weekdays">
                    <div>Mo</div><div>Di</div><div>Mi</div><div>Do</div><div>Fr</div><div>Sa</div><div>So</div>
                </div>
                <div id="calendar-grid" class="days-grid"></div>
            </div>
            <div class="admin-panel">
                <h3>Termin-Planer</h3>
                <div class="input-group">
                    <input type="date" id="event-date">
                    <input type="text" id="event-text" placeholder="Prüfungsname...">
                    <button class="add-btn" onclick="addUserEvent()">HINZUFÜGEN</button>
                </div>
            </div>
        </section>
        
        <section id="page-detail" class="page">
            <button class="back-btn" onclick="showPage('list')">← Zurück</button>
            <div class="banner">
                <h2 id="d-title">-</h2>
                <div id="d-avg">-</div>
            </div>
            <div class="input-group">
                <input type="number" id="n-in" placeholder="Punkte (0-15)">
                <button class="add-btn" onclick="addNote()">SPEICHERN</button>
            </div>
            <div id="n-list"></div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
