<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeFlow Ultra</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="sidebar">
        <div class="logo">Grade<span>Flow</span></div>
        <button class="nav-btn active" id="btn-list" onclick="showPage('list')">🏠 Dashboard</button>
        <button class="nav-btn" id="btn-goals" onclick="showPage('goals')">🎯 Ziele-Fokus</button>
        <button class="nav-btn" id="btn-settings" onclick="showPage('settings')">⚙️ Admin</button>
    </nav>

    <main class="main-content">
        <section id="page-list" class="page active">
            <div class="header-area">
                <h1>Dashboard</h1>
                <div class="global-avg-display">
                    <small>Schnitt</small>
                    <div id="dash-total">-</div>
                </div>
            </div>
            <div class="quick-add">
                <input type="text" id="f-name" placeholder="Name des Fachs...">
                <button onclick="addFach()">Hinzufügen</button>
            </div>
            <div id="grid-container" class="vibrant-grid"></div>
        </section>

        <section id="page-goals" class="page">
            <h1>🎯 Deine Ziele</h1>
            <div id="goals-list" class="huge-goals-stack"></div>
        </section>

        <section id="page-detail" class="page">
            <button onclick="showPage('list')" class="btn-back">← Zurück</button>
            <div class="mega-hero" id="det-header">
                <h1 id="det-title">-</h1>
                <div class="mega-avg" id="det-avg">-</div>
                <div id="det-status-badge" class="status-chip">-</div>
            </div>
            <div class="detail-controls">
                <div class="glass-card">
                    <h3>Zielwert festlegen</h3>
                    <input type="number" id="f-target-input" placeholder="Ziel...">
                    <button class="btn-action" onclick="saveFachTarget()">Ziel Speichern</button>
                </div>
                <div class="glass-card">
                    <h3>Note eintragen</h3>
                    <input type="number" id="n-val" placeholder="Punkte...">
                    <button class="btn-action" onclick="addNote()">Hinzufügen</button>
                </div>
            </div>
            <div id="notes-list" class="note-history"></div>
            <button onclick="deleteFach()" class="btn-del">Fach löschen</button>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
