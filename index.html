<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeFlow Ultimate v11</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="sidebar">
        <div class="logo">Grade<span>Flow</span></div>
        <div class="nav-links">
            <button class="nav-btn" id="nav-list" onclick="showPage('list')">🏠 Dashboard</button>
            <button class="nav-btn" id="nav-stats" onclick="showPage('stats')">📈 Statistiken</button>
            <button class="nav-btn" id="nav-settings" onclick="showPage('settings')">⚙️ Einstellungen</button>
        </div>
    </nav>

    <main class="main-content">
        <section id="page-list" class="page">
            <div class="page-header">
                <h1>Meine Fächer 👋</h1>
                <div class="input-bar">
                    <input type="text" id="f-name" placeholder="Fachname...">
                    <button class="btn-accent" onclick="addFach()">Hinzufügen</button>
                </div>
            </div>
            <div id="grid-container" class="dashboard-grid"></div>
        </section>

        <section id="page-stats" class="page">
            <h1>Performance-Analyse 📈</h1>
            <div class="stats-hero" id="stats-banner">
                <div class="stat-item">
                    <h2 id="total-avg">-</h2>
                    <p>Gesamtschnitt</p>
                </div>
                <div class="stat-item">
                    <h2 id="total-count">0</h2>
                    <p>Noten gesamt</p>
                </div>
            </div>
            
            <div class="stats-grid-main">
                <div class="input-card">
                    <h3>Fächer im Vergleich</h3>
                    <canvas id="myChart"></canvas>
                </div>
                <div class="input-card">
                    <h3>Dein Trend</h3>
                    <div id="trend-indicator" style="font-size: 1.2rem; font-weight: bold;">Berechne...</div>
                    <p style="color: #94a3b8; font-size: 0.9rem;">Vergleich: Letzte 3 Noten zum Rest.</p>
                </div>
            </div>
            <div id="stats-details" class="dashboard-grid" style="margin-top:20px;"></div>
        </section>

        <section id="page-settings" class="page">
            <h1>Einstellungen ⚙️</h1>
            <div class="settings-grid">
                <div class="input-card">
                    <h3>👤 Benutzerprofil</h3>
                    <label>Dein Name</label>
                    <input type="text" id="set-name" placeholder="Name...">
                    <button class="btn-accent" onclick="saveSettings()">Speichern</button>
                </div>
                <div class="input-card">
                    <h3>💾 Datenverwaltung</h3>
                    <button class="btn-secondary" onclick="exportData()">📥 Backup Export</button>
                    <button class="btn-danger" style="margin-top:10px" onclick="resetAll()">🗑️ Werkszustand</button>
                </div>
            </div>
        </section>

        <section id="page-detail" class="page">
            <button class="btn-link" onclick="showPage('list')">← Zurück</button>
            <div id="hero-banner" class="subject-hero">
                <div class="hero-info"><h2 id="det-title">-</h2></div>
                <div id="det-avg" class="hero-grade">-</div>
            </div>
            <div class="detail-layout">
                <div id="notes-history"></div>
                <div class="input-card" style="max-width: 320px;">
                    <h3>Note eintragen</h3>
                    <input type="number" id="n-val" placeholder="0-15 Punkte">
                    <button class="btn-accent" onclick="addNote()">Speichern</button>
                    <button class="btn-danger-outline" style="margin-top:20px" onclick="deleteFach()">Fach löschen</button>
                </div>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
