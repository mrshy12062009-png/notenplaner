<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeFlow Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="sidebar">
        <div class="logo">Grade<span>Flow</span></div>
        <button class="nav-btn active" id="btn-list" onclick="showPage('list')">🏠 Dashboard</button>
        <button class="nav-btn" id="btn-goals" onclick="showPage('goals')">🎯 Ziele-Check</button>
        <button class="nav-btn" id="btn-settings" onclick="showPage('settings')">⚙️ Einstellungen</button>
    </nav>

    <main class="main-content">
        <section id="page-list" class="page active">
            <h1>Dashboard</h1>
            <div class="input-card">
                <input type="text" id="f-name" placeholder="Neues Fach (z.B. Mathe)...">
                <button class="btn-accent" onclick="addFach()">Fach hinzufügen</button>
            </div>
            <div id="grid-container" class="dashboard-grid"></div>
        </section>

        <section id="page-goals" class="page">
            <h1>🎯 Deine Ziele pro Fach</h1>
            <p style="color: #94a3b8; margin-bottom: 20px;">Hier siehst du, ob du dein individuell gesetztes Ziel erreicht hast.</p>
            <div id="goals-list" class="goals-list"></div>
        </section>

        <section id="page-settings" class="page">
            <h1>⚙️ Einstellungen</h1>
            <div class="input-card">
                <h3>Datensicherung</h3>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button class="btn-secondary" onclick="exportData()">Exportieren</button>
                    <button class="btn-secondary" onclick="importData()">Importieren</button>
                </div>
            </div>
            <div class="input-card" style="border: 1px solid var(--danger);">
                <h3>Gefahrenzone</h3>
                <button class="btn-danger" onclick="resetAll()">⚠️ Alle Daten löschen</button>
            </div>
        </section>

        <section id="page-detail" class="page">
            <button onclick="showPage('list')" class="btn-secondary">← Zurück</button>
            
            <div class="detail-hero" id="det-header">
                <div class="hero-info">
                    <h1 id="det-title" style="margin:0">Fach</h1>
                    <div id="det-status-badge" class="status-pill">Status</div>
                </div>
                <div class="hero-avg" id="det-avg">-</div>
            </div>

            <div class="detail-grid">
                <div class="input-card">
                    <h3>Note hinzufügen</h3>
                    <input type="number" id="n-val" placeholder="Punkte (0-15)">
                    <button class="btn-accent" onclick="addNote()">Speichern</button>
                </div>
                <div class="input-card">
                    <h3>Individuelles Fach-Ziel</h3>
                    <input type="number" id="f-target-input" placeholder="Ziel (z.B. 13)">
                    <button class="btn-secondary" onclick="saveFachTarget()">Ziel speichern</button>
                </div>
            </div>

            <h3>Notenverlauf</h3>
            <div id="notes-list" class="history-list"></div>
            <button onclick="deleteFach()" class="btn-link-danger">Dieses Fach löschen</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
