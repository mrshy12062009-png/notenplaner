<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeFlow v15.2 Premium</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="sidebar">
        <div class="logo">Grade<span>Flow</span></div>
        <button class="nav-btn active" id="btn-list" onclick="showPage('list')">🏠 Dashboard</button>
        <button class="nav-btn" id="btn-stats" onclick="showPage('stats')">📈 Statistiken</button>
        <button class="nav-btn" id="btn-settings" onclick="showPage('settings')">⚙️ Einstellungen</button>
    </nav>

    <main class="main-content">
        <section id="page-list" class="page active">
            <h1>Hey, <span id="display-name">Schüler</span>! 👋</h1>
            <div class="input-card">
                <input type="text" id="f-name" placeholder="Neues Fach hinzufügen...">
                <button class="btn-accent" onclick="addFach()">Hinzufügen</button>
            </div>
            <div id="grid-container" class="dashboard-grid"></div>
        </section>

        <section id="page-stats" class="page">
            <h1>Statistiken & Analyse</h1>
            <div class="stats-hero">
                <div><h2 id="total-avg">-</h2><p>Gesamtschnitt</p></div>
                <div><h2 id="total-count">0</h2><p>Noten gesamt</p></div>
            </div>
            <div class="input-card">
                <canvas id="myChart"></canvas>
            </div>
        </section>

        <section id="page-settings" class="page">
            <h1>Einstellungen</h1>
            <div class="input-card">
                <label>Dein Name</label>
                <input type="text" id="set-name">
                
                <label>Ziel-Schnitt (Warnung bei Unterschreitung)</label>
                <input type="number" id="set-target" step="0.1">

                <label>Notensystem</label>
                <select id="set-system">
                    <option value="points">Oberstufe (0-15 Punkte)</option>
                    <option value="grades">Sek I (1-6 Noten)</option>
                </select>
                <button class="btn-accent" onclick="saveSettings()">Speichern & Anwenden</button>
            </div>
            
            <div class="input-card">
    <label>App-Design Farbe</label>
    <div class="color-picker">
        <div class="color-dot" style="background:#5865f2" onclick="changeTheme('#5865f2')"></div>
        <div class="color-dot" style="background:#ef4444" onclick="changeTheme('#ef4444')"></div>
        <div class="color-dot" style="background:#22c55e" onclick="changeTheme('#22c55e')"></div>
        <div class="color-dot" style="background:#f59e0b" onclick="changeTheme('#f59e0b')"></div>
        <div class="color-dot" style="background:#ec4899" onclick="changeTheme('#ec4899')"></div>
    </div>
</div>
            <button class="btn-danger" onclick="resetAll()">⚠️ Alle Daten löschen</button>
        </section>

        <section id="page-detail" class="page">
            <button onclick="showPage('list')" class="btn-back">← Dashboard</button>
            <h1 id="det-title">Fach</h1>
            <div class="stats-hero small"><h2 id="det-avg">-</h2></div>
            <div class="input-card">
                <input type="number" id="n-val" placeholder="Wert...">
                <button class="btn-accent" onclick="addNote()">Note speichern</button>
            </div>
            <div id="notes-list"></div>
            <button onclick="deleteFach()" class="btn-link-danger">Fach löschen</button>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
