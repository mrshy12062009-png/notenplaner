<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeFlow Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="sidebar">
        <div class="logo">Grade<span>Flow</span></div>
        <button class="nav-btn active" id="btn-list" onclick="showPage('list')">🏠 Dashboard</button>
        <button class="nav-btn" id="btn-goals" onclick="showPage('goals')">🎯 Meine Ziele</button>
        <button class="nav-btn" id="btn-settings" onclick="showPage('settings')">⚙️ Einstellungen</button>
    </nav>

    <main class="main-content">
        <section id="page-list" class="page active">
            <div class="header-area">
                <h1>Dashboard</h1>
                <div class="total-status-card" id="global-analysis-dash">
                    Gesamtschnitt: <span id="dash-total">-</span>
                </div>
            </div>
            <div class="input-card">
                <input type="text" id="f-name" placeholder="Neues Fach hinzufügen...">
                <button class="btn-accent" onclick="addFach()">Hinzufügen</button>
            </div>
            <div id="grid-container" class="dashboard-grid"></div>
        </section>

        <section id="page-goals" class="page">
            <h1>🎯 Meine Ziele</h1>
            <div class="input-card">
                <label>Globales Gesamtziel</label>
                <input type="number" id="goal-input" step="0.1" oninput="updateGlobalGoal(this.value)">
                <p id="total-goal-feedback" style="margin-top:10px; font-weight:bold;"></p>
            </div>
            <h3>Fächer-Analyse <small>(Klicken für Fach-Ziel)</small></h3>
            <div id="goals-list" class="goals-list"></div>
        </section>

        <section id="page-settings" class="page">
            <h1>⚙️ Einstellungen</h1>
            <div class="input-card">
                <button class="btn-danger" onclick="resetAll()">⚠️ Alle Daten löschen</button>
            </div>
        </section>

        <section id="page-detail" class="page">
            <button onclick="showPage('list')" class="btn-back">← Zurück</button>
            <div class="detail-hero" id="det-header">
                <div class="hero-content">
                    <h1 id="det-title" style="margin:0">Fachname</h1>
                    <div id="det-status-badge" class="status-pill">Status</div>
                </div>
                <div class="hero-avg">
                    <span id="det-avg">-</span>
                </div>
            </div>

            <div class="detail-grid">
                <div class="input-card">
                    <h3>Note eintragen</h3>
                    <input type="number" id="n-val" placeholder="Punkte...">
                    <button class="btn-accent" onclick="addNote()">Speichern</button>
                </div>
                <div class="input-card">
                    <h3>Analyse</h3>
                    <div id="det-analysis-text">-</div>
                </div>
            </div>
            
            <h3>Notenverlauf</h3>
            <div id="notes-list" class="notes-history"></div>
            <button onclick="deleteFach()" class="btn-link-danger">🗑️ Fach löschen</button>
        </section>
    </main>

    <div id="goal-modal" class="modal" onclick="if(event.target == this) closeModal()">
        <div class="modal-content">
            <h3 id="modal-title">Ziel setzen</h3>
            <input type="number" id="modal-goal-input" placeholder="Ziel für dieses Fach...">
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button class="btn-accent" onclick="saveSubjectGoal()">Speichern</button>
                <button class="btn-danger" onclick="closeModal()">Abbrechen</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
