<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>GradeFlow Ultimate</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="logo">Grade<span>Flow</span></div>
            <nav>
                <button onclick="tab('dash')" id="t-dash" class="nav-active">Dashboard</button>
                <button onclick="tab('goals')" id="t-goals">Ziele</button>
            </nav>
            <button class="reset" onclick="localStorage.clear(); location.reload();">Reset</button>
        </aside>

        <main class="main">
            <section id="view-dash" class="view active">
                <div class="header">
                    <h1>Dashboard</h1>
                    <div class="avg-box">Schnitt: <b id="total-avg">0.0</b></div>
                </div>
                <div class="input-group">
                    <input type="text" id="sub-in" placeholder="Fach-Name..." onkeydown="if(event.key==='Enter') addSub()">
                    <button onclick="addSub()">Hinzufügen</button>
                </div>
                <div id="grid" class="grid"></div>
            </section>

            <section id="view-goals" class="view">
                <h1>Deine Ziele</h1>
                <div id="goals-list"></div>
            </section>

            <section id="view-det" class="view">
                <button class="back" onclick="tab('dash')">← Zurück</button>
                <div id="hero" class="hero">
                    <h2 id="det-name">Fach</h2>
                    <div id="det-avg" class="big-num">0.0</div>
                </div>
                <div class="card">
                    <h3>Note eintragen</h3>
                    <div class="input-group">
                        <input type="number" id="grade-in" placeholder="0-15 Punkte" onkeydown="if(event.key==='Enter') addGrade()">
                        <button onclick="addGrade()">OK</button>
                    </div>
                </div>
                <div id="history" class="history"></div>
                <button class="del-btn" onclick="delSub()">Fach löschen</button>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
