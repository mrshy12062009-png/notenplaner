<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeFlow Pro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="sidebar">
        <div class="logo">Grade<span>Flow</span></div>
        <div class="nav-links">
            <button class="nav-btn" id="nav-list" onclick="showPage('list')">🏠 Dashboard</button>
            <button class="nav-btn" id="nav-stats" onclick="showPage('stats')">📈 Statistiken</button>
            <button class="nav-btn" id="nav-settings" onclick="showPage('settings')">⚙️ Einstellungen</button>
        </div>
    </nav>

    <main class="main-content">
        <section id="page-list" class="page">
            <div class="page-header">
                <h1>Hallo, <span id="user-name-display">Schüler</span>! 👋</h1>
                <div class="input-bar">
                    <input type="text" id="f-name" placeholder="Neues Fach...">
                    <button class="btn-accent" onclick="addFach()">Hinzufügen</button>
                </div>
            </div>
            <div id="grid-container" class="dashboard-grid"></div>
        </section>

        <section id="page-stats" class="page">
            <h1>Deine Performance 📊</h1>
            <div class="stats-hero" id="stats-banner">
                <div class="stat-item">
                    <h2 id="total-avg">-</h2>
                    <p>Gesamtschnitt</p>
                </div>
                <div class="stat-item">
                    <h2 id="total-count">0</h2>
                    <p>Noten gesamt</p>
                </div>
            </div>
            <div id="stats-details" class="dashboard-grid"></div>
        </section>

        <section id="page-settings" class="page">
            <h1>Einstellungen ⚙️</h1>
            <div class="settings-grid">
                <div class="input-card">
                    <h3>👤 Profil</h3>
                    <label>Dein Anzeigename</label>
                    <input type="text" id="set-name" placeholder="Name eingeben...">
                    <button class="btn-accent" onclick="saveSettings()">Namen speichern</button>
                </div>

                <div class="input-card">
                    <h3>💾 Daten-Backup</h3>
                    <p>Sichere deine Noten als Textdatei oder lösche alles.</p>
                    <div class="button-row">
                        <button class="btn-secondary" onclick="exportData()">📥 Exportieren</button>
                        <button class="btn-danger" onclick="resetAll()">🗑️ Alles löschen</button>
                    </div>
                </div>
            </div>
        </section>

        <section id="page-detail" class="page">
            <button class="btn-link" onclick="showPage('list')">← Zurück</button>
            <div id="hero-banner" class="subject-hero">
                <div class="hero-info"><h2 id="det-title">-</h2><p>Punkteschnitt</p></div>
                <div id="det-avg" class="hero-grade">-</div>
            </div>
            <div class="detail-layout">
                <div id="notes-history"></div>
                <div class="input-card">
                    <h3>Note hinzufügen</h3>
                    <input type="number" id="n-val" placeholder="0-15 Punkte">
                    <button class="btn-accent" onclick="addNote()">Speichern</button>
                    <button class="btn-danger-outline" onclick="deleteFach()">Fach löschen</button>
                </div>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
