<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeFlow Pro</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">Grade<span>Flow</span></div>
            <nav>
                <button onclick="tab('dash')" id="btn-dash" class="nav-btn active">Dashboard</button>
                <button onclick="tab('stats')" id="btn-stats" class="nav-btn">Analyse</button>
            </nav>
            <div class="sidebar-bottom">
                <button class="reset-trigger" onclick="confirmReset()">System Reset</button>
            </div>
        </aside>

        <main class="content">
            <section id="view-dash" class="view active">
                <div class="header">
                    <h1>Übersicht</h1>
                    <div class="quick-add">
                        <input type="text" id="sub-in" placeholder="Fach hinzufügen...">
                        <button onclick="addSub()">+</button>
                    </div>
                </div>
                <div id="dash-grid" class="grid"></div>
            </section>

            <section id="view-stats" class="view">
                <h1>Analyse</h1>
                <div class="stats-container">
                    <div class="chart-card">
                        <h3>Punkteverteilung</h3>
                        <div id="bar-chart" class="bars"></div>
                    </div>
                    <div class="info-cards">
                        <div class="mini-card">
                            <span>Schnitt</span>
                            <h2 id="total-avg">0.0</h2>
                        </div>
                        <div class="mini-card">
                            <span>Bestleistung</span>
                            <h2 id="best-grade">-</h2>
                        </div>
                    </div>
                </div>
            </section>

            <section id="view-det" class="view">
                <button class="back-btn" onclick="tab('dash')">← Zurück</button>
                <div class="subject-hero">
                    <h2 id="det-title">Mathe</h2>
                    <div class="big-avg" id="det-avg">0.0</div>
                </div>
                <div class="add-grade-zone">
                    <input type="number" id="grade-in" placeholder="0-15 Pkt" min="0" max="15">
                    <button onclick="addGrade()">Eintragen</button>
                </div>
                <div id="grade-history" class="history-list"></div>
                <button class="delete-subject" onclick="delSub()">Dieses Fach komplett löschen</button>
            </section>
        </main>
    </div>

    <div id="reset-modal" class="modal">
        <div class="modal-content">
            <h2>System-Reset?</h2>
            <p>Alle Daten werden unwiderruflich gelöscht.</p>
            <div class="modal-btns">
                <button class="confirm" onclick="executeReset()">Ja, löschen</button>
                <button class="cancel" onclick="closeReset()">Abbrechen</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
