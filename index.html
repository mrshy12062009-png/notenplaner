<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>GradeFlow | Pure Edition</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="modal" class="modal-overlay hidden">
        <div class="modal-content">
            <h2 id="modal-title">Bist du sicher?</h2>
            <div class="modal-btns">
                <button class="btn-confirm" id="confirm-btn">Löschen</button>
                <button class="btn-cancel" onclick="closeModal()">Abbrechen</button>
            </div>
        </div>
    </div>

    <div class="app">
        <aside class="sidebar">
            <div class="brand">Grade<span>Flow</span></div>
            <nav>
                <button class="nav-item active" id="btn-dash" onclick="switchTab('dash')">🏠 Dashboard</button>
                <button class="nav-item" id="btn-goals" onclick="switchTab('goals')">🎯 Ziel-Planer</button>
            </nav>
            <div class="sidebar-footer">
                <button onclick="askReset()">Daten-Reset</button>
            </div>
        </aside>

        <main class="viewport">
            <section id="tab-dash" class="tab active">
                <header class="view-header">
                    <h1>Dashboard</h1>
                    <div class="avg-display">
                        <small>Gesamtschnitt</small>
                        <span id="global-avg">0.0</span>
                    </div>
                </header>
                <div class="quick-add">
                    <input type="text" id="subject-name" placeholder="Fach-Name... (Enter)" onkeydown="if(event.key==='Enter') addSubject()">
                    <button onclick="addSubject()">+</button>
                </div>
                <div id="dash-grid" class="grid-layout"></div>
            </section>

            <section id="tab-goals" class="tab">
                <header class="view-header">
                    <h1>Ziel-Status</h1>
                </header>
                <div id="goals-list" class="goals-container"></div>
            </section>

            <section id="tab-det" class="tab">
                <button class="back-btn" onclick="switchTab('dash')">← Zurück</button>
                <div id="subject-hero" class="hero-card">
                    <h1 id="det-title">-</h1>
                    <div class="hero-score" id="det-avg">0.0</div>
                    <div class="badge" id="det-label">-</div>
                </div>
                <div class="input-section">
                    <div class="input-card">
                        <h3>Note hinzufügen</h3>
                        <div class="flex-row">
                            <input type="number" id="new-grade" min="0" max="15" placeholder="Punkte (0-15)">
                            <button onclick="saveGrade()">Eintragen</button>
                        </div>
                    </div>
                </div>
                <div id="history-stack" class="history-grid"></div>
                <button class="delete-link" onclick="askDeleteSubject()">Fach unwiderruflich löschen</button>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
