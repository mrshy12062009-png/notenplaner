<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeFlow v16 Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="sidebar">
        <div class="logo">Grade<span>Flow</span></div>
        <button class="nav-btn active" id="btn-list" onclick="showPage('list')">🏠 Dashboard</button>
        <button class="nav-btn" id="btn-goals" onclick="showPage('goals')">🎯 Meine Ziele</button>
        <button class="nav-btn" id="btn-stats" onclick="showPage('stats')">📈 Statistiken</button>
        <button class="nav-btn" id="btn-settings" onclick="showPage('settings')">⚙️ Einstellungen</button>
    </nav>

    <main class="main-content">
        <section id="page-list" class="page active">
            <h1>Dashboard</h1>
            <div class="input-card">
                <input type="text" id="f-name" placeholder="Neues Fach...">
                <button class="btn-accent" onclick="addFach()">Hinzufügen</button>
            </div>
            <div id="grid-container" class="dashboard-grid"></div>
        </section>

        <section id="page-goals" class="page">
            <h1>Meine Ziele</h1>
            <div class="input-card">
                <h3>Ziel-Schnitt festlegen</h3>
                <p style="color: #94a3b8; font-size: 14px;">Ab diesem Wert werden Noten als "Gut" (Grün) markiert.</p>
                <input type="number" id="goal-input" step="0.1" onchange="updateGoal(this.value)">
                <div id="goal-preview" style="margin-top: 20px;"></div>
            </div>
            <div class="input-card">
                <h3>Farblegende</h3>
                <div class="status-legend">
                    <div class="legend-item"><span class="dot bg-success"></span> <span>Ziel erreicht (Gut)</span></div>
                    <div class="legend-item"><span class="dot bg-warning"></span> <span>Knapp darunter (Mittel)</span></div>
                    <div class="legend-item"><span class="dot bg-danger"></span> <span>Handlungsbedarf (Schlecht)</span></div>
                </div>
            </div>
        </section>

        <section id="page-stats" class="page">
            <h1>Statistiken</h1>
            <div class="stats-hero">
                <div><h2 id="total-avg">-</h2><p>Gesamtschnitt</p></div>
                <div><h2 id="total-count">0</h2><p>Noten gesamt</p></div>
            </div>
            <div class="input-card"><canvas id="myChart"></canvas></div>
        </section>

        <section id="page-settings" class="page">
            <h1>Einstellungen</h1>
            <div class="input-card">
                <label>Dein Name</label>
                <input type="text" id="set-name" oninput="updateName(this.value)">
                <label>Notensystem</label>
                <select id="set-system" onchange="updateSystem(this.value)">
                    <option value="points">Punkte (0-15)</option>
                    <option value="grades">Noten (1-6)</option>
                </select>
            </div>
            <div class="input-card">
                <label>App-Design Farbe</label>
                <div class="color-picker">
                    <div class="color-dot" style="background:#5865f2" onclick="changeTheme('#5865f2')"></div>
                    <div class="color-dot" style="background:#00d2ff" onclick="changeTheme('#00d2ff')"></div>
                    <div class="color-dot" style="background:#a855f7" onclick="changeTheme('#a855f7')"></div>
                    <div class="color-dot" style="background:#ff4757" onclick="changeTheme('#ff4757')"></div>
                    <div class="color-dot" style="background:#2ed573" onclick="changeTheme('#2ed573')"></div>
                </div>
            </div>
            <button class="btn-danger" onclick="resetAll()">⚠️ Alle Daten löschen</button>
        </section>

        <section id="page-detail" class="page">
            <button onclick="showPage('list')" class="btn-back">← Zurück</button>
            <h1 id="det-title">-</h1>
            <div id="notes-list"></div>
            <div class="input-card">
                <input type="number" id="n-val" placeholder="Note eingeben...">
                <button class="btn-accent" onclick="addNote()">Speichern</button>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
