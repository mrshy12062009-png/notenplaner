<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>GradeFlow Ultimate</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">Grade<span>Flow</span></div>
            <nav>
                <button onclick="tab('dash')" id="t-dash" class="active">Dashboard</button>
                <button onclick="tab('stats')" id="t-stats">Analyse & Stats</button>
            </nav>
            <button class="reset-btn" onclick="fullReset()">Daten löschen</button>
        </aside>

        <main class="main-content">
            <section id="view-dash" class="view active">
                <div class="view-header">
                    <h1>Deine Fächer</h1>
                    <div class="glass-input">
                        <input type="text" id="sub-in" placeholder="Neues Fach...">
                        <button onclick="addSub()">Hinzufügen</button>
                    </div>
                </div>
                <div id="dash-grid" class="bento-grid"></div>
            </section>

            <section id="view-stats" class="view">
                <h1>Statistiken</h1>
                <div class="chart-card">
                    <h3>Punkte-Verteilung (0 bis 15)</h3>
                    <div id="stats-chart" class="visual-chart"></div>
                    <div class="chart-legend">
                        <span>0</span><span>5</span><span>10</span><span>15</span>
                    </div>
                </div>
                <div class="stats-grid">
                    <div class="stat-tile"><span>Schnitt</span><h2 id="st-avg">0.0</h2></div>
                    <div class="stat-tile"><span>Bestwert</span><h2 id="st-best">-</h2></div>
                </div>
            </section>

            <section id="view-det" class="view">
                <div class="det-nav">
                    <button onclick="tab('dash')">← Zurück</button>
                    <h2 id="det-name">Fach</h2>
                </div>
                <div class="score-hero">
                    <div class="score-ring" id="det-avg">0.0</div>
                </div>
                <div class="glass-input det-input">
                    <input type="number" id="grade-in" placeholder="Punkte (0-15)">
                    <button onclick="addGrade()">Eintragen</button>
                </div>
                <div id="history" class="noten-liste"></div>
                <button class="delete-sub-btn" onclick="delSub()">Fach entfernen</button>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
