<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeFlow Live</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="sidebar">
        <div class="logo">GRADE<span>FLOW</span></div>
        <button class="nav-btn active" id="btn-list" onclick="showPage('list')">DASHBOARD</button>
        <button class="nav-btn" id="btn-calendar" onclick="showPage('calendar')">KALENDER</button>
        
        <div class="settings">
            <label>Bundesland:</label>
            <select id="bundesland" onchange="saveBundesland()">
                <option value="BE">Berlin</option>
                <option value="BY">Bayern</option>
                <option value="BW">Baden-Württemberg</option>
                <option value="HE">Hessen</option>
                <option value="NW">NRW</option>
                <option value="SN">Sachsen</option>
            </select>
        </div>
    </nav>

    <main class="content">
        <section id="page-list" class="page active">
            <h1>MEINE FÄCHER</h1>
            <div class="input-group">
                <input type="text" id="f-in" placeholder="Neues Fach...">
                <button class="add-btn" onclick="addFach()">HINZUFÜGEN</button>
            </div>
            <div id="grid" class="grid"></div>
        </section>
        
        <section id="page-detail" class="page">
            <button class="back-btn" onclick="showPage('list')">← Dashboard</button>
            <div class="banner">
                <h2 id="d-title">Fachname</h2>
                <div id="d-avg">Schnitt: --</div>
            </div>
            
            <div class="detail-grid">
                <div class="card-ui">
                    <h3>Ziel setzen</h3>
                    <input type="number" id="goal-in" min="0" max="15" onchange="updateGoal()">
                    <p id="goal-status" style="margin-top:10px;"></p>
                </div>

                <div class="card-ui">
                    <h3>Note eintragen</h3>
                    <div class="input-group">
                        <input type="number" id="n-in" placeholder="Punkte (0-15)">
                        <button class="add-btn" onclick="addNote()">OK</button>
                    </div>
                </div>
            </div>

            <h3>Notenverlauf</h3>
            <div id="n-list"></div>
        </section>

        <section id="page-calendar" class="page">
            <h1>SCHULKALENDER 2026</h1>
            <div id="calendar-info" class="calendar-grid">
                </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
