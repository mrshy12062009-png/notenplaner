<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeFlow Live</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="sidebar">
        <div class="logo">GRADE<span>FLOW</span></div>
        <button class="nav-btn active" id="btn-list" onclick="showPage('list')">DASHBOARD</button>
        <button class="nav-btn" id="btn-calendar" onclick="showPage('calendar')">KALENDER</button>
        
        <div class="settings">
            <label>Bundesland:</label>
            <select id="bundesland" onchange="saveBundesland()">
                <option value="BE">Berlin</option>
                <option value="BY">Bayern</option>
                <option value="BW">Baden-Württemberg</option>
                <option value="HE">Hessen</option>
                <option value="NW">NRW</option>
                <option value="SN">Sachsen</option>
            </select>
        </div>
    </nav>

    <main class="content">
        <section id="page-list" class="page active">
            <h1>MEINE FÄCHER</h1>
            <div class="input-group">
                <input type="text" id="f-in" placeholder="Fach hinzufügen...">
                <button class="add-btn" onclick="addFach()">OK</button>
            </div>
            <div id="grid" class="grid"></div>
        </section>
        
        <section id="page-detail" class="page">
            <button class="back-btn" onclick="showPage('list')">← Zurück</button>
            <div class="banner">
                <h2 id="d-title">-</h2>
                <div id="d-avg">-</div>
            </div>
            
            <div class="goal-card">
                <h3>Zielsetzung</h3>
                <input type="number" id="goal-in" min="0" max="15" onchange="updateGoal()">
                <p id="goal-status"></p>
            </div>

            <div class="input-group">
                <input type="number" id="n-in" placeholder="Note (0-15)">
                <button class="add-btn" onclick="addNote()">SPEICHERN</button>
            </div>
            <div id="n-list"></div>
        </section>

        <section id="page-calendar" class="page">
            <h1>SCHULKALENDER 2026</h1>
            <p>Ferien & Termine für dein Bundesland:</p>
            <div id="calendar-info" class="calendar-grid">
                </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
