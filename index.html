<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeFlow v14.3</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="sidebar">
        <div class="logo">Grade<span>Flow</span></div>
        <button class="nav-btn" onclick="showPage('list')">🏠 Dashboard</button>
        <button class="nav-btn" onclick="showPage('stats')">📈 Statistiken</button>
        <button class="nav-btn" onclick="showPage('settings')">⚙️ Einstellungen</button>
    </nav>

    <main class="main-content">
        <section id="page-list" class="page">
            <h1>Hallo, <span id="display-name">Schüler</span>!</h1>
            <div class="input-card">
                <input type="text" id="f-name" placeholder="Neues Fach...">
                <button class="btn-accent" onclick="addFach()">Fach hinzufügen</button>
            </div>
            <div id="grid-container" class="dashboard-grid"></div>
        </section>

        <section id="page-stats" class="page">
            <h1>Performance-Analyse</h1>
            <div class="stats-hero">
                <div><h2 id="total-avg">-</h2><p>Gesamtschnitt</p></div>
                <div><h2 id="total-count">0</h2><p>Noten gesamt</p></div>
            </div>
            <div class="input-card">
                <canvas id="myChart"></canvas>
            </div>
        </section>

        <section id="page-settings" class="page">
            <h1>Einstellungen</h1>
            <div class="input-card">
                <h3>Profil</h3>
                <input type="text" id="set-name" placeholder="Dein Name...">
                <select id="set-system">
                    <option value="points">Oberstufe (0-15 Punkte)</option>
                    <option value="grades">Sek I (1-6 Noten)</option>
                </select>
                <button class="btn-accent" onclick="saveSettings()">Speichern</button>
            </div>
            <div class="input-card">
                <h3>Design</h3>
                <div class="color-picker">
                    <div class="color-dot" style="background:#5865f2" onclick="changeTheme('#5865f2')"></div>
                    <div class="color-dot" style="background:#a855f7" onclick="changeTheme('#a855f7')"></div>
                    <div class="color-dot" style="background:#22c55e" onclick="changeTheme('#22c55e')"></div>
                    <div class="color-dot" style="background:#f97316" onclick="changeTheme('#f97316')"></div>
                </div>
            </div>
            <button class="btn-danger" onclick="resetAll()">⚠️ Alles löschen</button>
        </section>

        <section id="page-detail" class="page">
            <button onclick="showPage('list')" class="btn-link">← Zurück</button>
            <div class="subject-hero">
                <h1 id="det-title">Fach</h1>
                <div id="det-avg" class="hero-grade">-</div>
            </div>
            <div style="display: flex; gap: 20px;">
                <div id="notes-list" style="flex: 1;"></div>
                <div class="input-card" style="width: 250px;">
                    <h3>Note hinzufügen</h3>
                    <input type="number" id="n-val" placeholder="Wert...">
                    <button class="btn-accent" onclick="addNote()">Speichern</button>
                    <button class="btn-danger" style="background:none; color:#ef4444" onclick="deleteFach()">Fach löschen</button>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
